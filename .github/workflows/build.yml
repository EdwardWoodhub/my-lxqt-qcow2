name: bluebuild
on:
  schedule:
    - cron:
        "38 20 * * *" # build at 04:38 CST every day
        # (20 minutes after last ublue images start building)
  push:
    paths-ignore: # don't rebuild if only documentation has changed
      - "**.md"

  pull_request:
  workflow_dispatch: # allow manually triggering builds
concurrency:
  # only run one build at a time
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true
jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false # stop GH from cancelling all matrix builds if one fails
      matrix:
        recipe:
          # !! Add your recipes here
          - recipe.yml
    steps:
      # the build is fully handled by the reusable github action
      - name: Build Custom Image
        uses: blue-build/github-action@v1.10
        with:
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }} # 这里的钥匙现在你有啦！
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}

          # enabled by default, disable if your image is small and you want faster builds
          maximize_build_space: true

# ==========================================
  # Job 2：【新增】将上面构建好的容器镜像转换为 qcow2 镜像并作为 Artifacts 供下载
  # ==========================================
  build-disk:
    name: Build QCOW2 Disk Image
    runs-on: ubuntu-latest
    needs: bluebuild # 必须要等 Job 1（容器构建）成功后才会执行此步骤
    permissions:
      contents: write  # 👈 这一行非常关键！没有它，Release 步骤会报 403 权限拒绝
    # 仅在 main 默认分支上推送或手动触发时才生成磁盘镜像，避免 PR 时浪费 Actions 额度
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'

    steps:
      # 1. 释放 GitHub Runner 的磁盘空间，防止编译虚拟机镜像时爆磁盘
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true

      # 2. 检出代码以读取必要信息
      - name: Checkout Repo
        uses: actions/checkout@v4

      # 1. 登录 GHCR 以获得拉取私有/公开自定义镜像的权限
      - name: Log in to GHCR
        uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. 提前拉取你刚刚构建好的最新系统镜像到本地
      - name: Pull Custom Image to Local
        run: |
          sudo podman pull ghcr.io/edwardwoodhub/my-lxqt-qcow2:latest

      # 3. 使用 bootc-image-builder 将刚才打包好的 GHCR 镜像转换为 qcow2 格式
      - name: Build QCOW2
        # 我们使用红帽官方推荐的 bootc 镜像构建工具（容器版运行）
        run: |
          mkdir -p ./output
          sudo podman run \
            --rm \
            --privileged \
            --security-opt label=disable \
            -v ./output:/output \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type qcow2 \
            --rootfs ext4 \
            ghcr.io/edwardwoodhub/my-lxqt-qcow2:latest
          # 💡 注意：请将上面最后一行的 "your-image-name" 替换为你在 recipe.yml 或 GitHub 中实际生成的容器镜像名称。
          # ================== 【这里是新增的压缩核心逻辑】 ==================
          echo "检测到生成了 disk.qcow2，开始进行 QEMU 极限块压缩..."
          
          # 1. 使用 -c 参数进行压缩转换，输出到临时文件 compressed.qcow2
          sudo qemu-img convert -c -O qcow2 ./output/qcow2/disk.qcow2 ./output/qcow2/compressed.qcow2
          
          # 2. 用压缩后的小文件覆盖原有的巨无霸文件
          sudo mv ./output/qcow2/compressed.qcow2 ./output/qcow2/disk.qcow2
          
          echo "压缩完成！最终文件大小为："
          ls -lh ./output/qcow2/disk.qcow2
          # ================================================================

      # 4. 将生成的 qcow2 文件上传到 GitHub 运行结果的 Artifacts 中
      - name: Upload QCOW2 as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-lxqt-qcow2
          path: ./output/qcow2/disk.qcow2
          if-no-files-found: error

      # 【新增：发布到 Release 环节】
      - name: Release QCOW2 Image
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-qcow2      # 固定的 Tag 名字，方便以后每次覆盖更新
          name: "Latest Custom Bluefin QCOW2 Image"
          body: "This is the latest compiled QCOW2 image of your custom Bluefin system."
          # 指向你本地刚刚生成的裸 qcow2 文件路径
          files: ./output/qcow2/disk.qcow2 
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 必须配这个，Action 才有权帮你创建 Release
